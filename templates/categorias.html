{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-head"><div><h2>🏷️ Categorias</h2><p>Organize suas despesas por categoria.</p></div></div>
  <form class="simple-form" method="post" action="/categorias/add">
    <input type="hidden" name="month" value="{{ month }}"><input type="hidden" name="year" value="{{ year }}">
    <label>Nova categoria<input name="name" required></label>
    <button>Adicionar</button>
  </form>
  <div class="category-list">
    {% for c in categories %}
    <div class="category-item"><span>{{ c.name }}</span><form method="post" action="/categorias/{{ c.id }}/delete" onsubmit="return confirm('Excluir categoria?')"><input type="hidden" name="month" value="{{ month }}"><input type="hidden" name="year" value="{{ year }}"><button>Excluir</button></form></div>
    {% else %}<div class="empty">Nenhuma categoria cadastrada.</div>{% endfor %}
  </div>
</section>
{% endblock %}
